<svg xmlns="http://www.w3.org/2000/svg" width="700" height="200" viewBox="0 0 700 200">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#0891B2"/>
  <stop offset="50%" stop-color="#0E7490"/>
  <stop offset="100%" stop-color="#059669"/>
</linearGradient>
    <linearGradient id="lightBar" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#0891B2"/>
  <stop offset="50%" stop-color="#0E7490"/>
  <stop offset="100%" stop-color="#059669"/>
</linearGradient>

    <!-- Glass frost filter -->
    <filter id="glassFrost" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feFlood flood-color="rgba(6,182,212,0.04)" result="fill"/>
      <feComposite in="fill" in2="blur" operator="in" result="frosted"/>
      <feComposite in="frosted" in2="SourceGraphic" operator="over"/>
    </filter>

    <!-- Light bar glow -->
    <filter id="lightGlow" x="-20%" y="-200%" width="140%" height="600%">
      <feGaussianBlur stdDeviation="8" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Title glow -->
    <filter id="titleGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner highlight on glass -->
    <linearGradient id="innerHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Glass panel -->
  <rect x="20" y="16" width="660" height="168"
        rx="24" ry="24"
        fill="rgba(6,182,212,0.04)"
        stroke="rgba(6,182,212,0.08)" stroke-width="1"/>

  <!-- Inner highlight layer -->
  <rect x="20" y="16" width="660" height="168"
        rx="24" ry="24"
        fill="url(#innerHighlight)"/>

  <!-- Light bar (Turrell-inspired) -->
  <rect x="44" y="20" width="612" height="5"
        rx="2.5" ry="2.5"
        fill="url(#lightBar)" opacity="0.45"
        filter="url(#lightGlow)"/>

  <!-- Title -->
  <text x="350.0" y="83.2"
        font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', 'Segoe UI', sans-serif"
        font-size="28" font-weight="200"
        fill="url(#titleGrad)" text-anchor="middle"
        letter-spacing="8"
        filter="url(#titleGlow)">ADHD DRIFT VISUALIZER</text>

  <!-- Subtitle -->
  <text x="350.0" y="113.2"
        font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif"
        font-size="14" font-weight="300"
        fill="#86868B" text-anchor="middle"
        letter-spacing="5">context-switch mapper</text>

  <!-- Tagline -->
  <text x="350.0" y="137.2"
        font-family="'SF Pro Text', 'Inter', 'Helvetica Neue', sans-serif"
        font-size="11" font-weight="300"
        fill="#AEAEB2" text-anchor="middle"
        letter-spacing="1.5">Pivots are data, not deficits</text>

  <!-- Watermark -->
  <text x="668" y="176"
        font-family="monospace" font-size="3.5"
        fill="#0E7490" opacity="0.08"
        text-anchor="end">KevQ</text>
</svg>
